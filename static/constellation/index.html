<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constellation — Humanity and AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0c; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
#ui {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 20px 24px; display: flex; align-items: center; gap: 16px;
  background: linear-gradient(to bottom, rgba(10,10,12,0.9) 0%, transparent 100%);
  pointer-events: none;
}
#ui > * { pointer-events: auto; }
#title {
  font-size: 11px; letter-spacing: 6px; text-transform: uppercase;
  color: rgba(232,224,208,0.3); flex-shrink: 0;
  font-weight: 300;
}
#search {
  background: rgba(232,224,208,0.06); border: 1px solid rgba(232,224,208,0.08);
  color: rgba(232,224,208,0.7); padding: 8px 16px; border-radius: 4px;
  font-size: 13px; width: 280px; outline: none;
  font-family: inherit;
}
#search::placeholder { color: rgba(232,224,208,0.2); }
#search:focus { border-color: rgba(201,168,76,0.3); }
#filters {
  display: flex; gap: 8px; margin-left: auto;
}
.filter-btn {
  background: rgba(232,224,208,0.04); border: 1px solid rgba(232,224,208,0.08);
  color: rgba(232,224,208,0.3); padding: 6px 14px; border-radius: 3px;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  transition: all 0.3s ease; font-family: inherit;
}
.filter-btn:hover { border-color: rgba(232,224,208,0.2); color: rgba(232,224,208,0.5); }
.filter-btn.active { border-color: var(--fc); color: var(--fc); background: rgba(232,224,208,0.06); }
#info-panel {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  z-index: 10; text-align: center; max-width: 500px; width: 90%;
  opacity: 0; transition: opacity 0.6s ease; pointer-events: none;
}
#info-panel.visible { opacity: 1; }
#info-label {
  font-size: 14px; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(232,224,208,0.6); margin-bottom: 6px;
}
#info-domain {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 10px;
}
#info-desc {
  font-size: 13px; line-height: 1.6; color: rgba(232,224,208,0.35);
}
#info-stat {
  margin-top: 10px; font-size: 22px; font-weight: 300;
  color: rgba(201,168,76,0.6);
}
#info-stat-label {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(232,224,208,0.2); margin-top: 2px;
}
#hint {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(232,224,208,0.1); z-index: 5;
}
</style>
</head>
<body>
<div id="ui">
  <div id="title">Constellation</div>
  <input id="search" type="text" placeholder="Search ideas..." autocomplete="off">
  <div id="filters">
    <button class="filter-btn active" data-domain="all" style="--fc:rgba(232,224,208,0.5)">All</button>
    <button class="filter-btn" data-domain="foundation" style="--fc:#ff6b35">Foundation</button>
    <button class="filter-btn" data-domain="emergence" style="--fc:#4ecdc4">Emergence</button>
    <button class="filter-btn" data-domain="philosophy" style="--fc:#c9a84c">Philosophy</button>
    <button class="filter-btn" data-domain="infrastructure" style="--fc:#ff8c55">Infrastructure</button>
    <button class="filter-btn" data-domain="media" style="--fc:#fbbf24">Media</button>
  </div>
</div>
<div id="info-panel">
  <div id="info-label"></div>
  <div id="info-domain"></div>
  <div id="info-desc"></div>
  <div id="info-stat"></div>
  <div id="info-stat-label"></div>
</div>
<div id="hint">drag to orbit · scroll to zoom · click a star</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// CONSTELLATION DATA — Real ideas from Humanity and AI project

  {id:"ph-flourishing", label:"Human Flourishing", domain:"philosophy", desc:"The ultimate measure. Not GDP, not efficiency — whether people are living lives of dignity, purpose, and fulfillment.", x:1.5,y:5,z:0.5},
  {id:"ph-sustainability", label:"Sustainability", domain:"philosophy", desc:"Aligning technological development with long-term environmental and social well-being.", x:-1.5,y:5,z:1},
  {id:"ph-ethical-innovation", label:"Ethical Innovation", domain:"philosophy", desc:"Pursuing advancement while always prioritizing ethical implications and societal impacts.", x:0,y:4,z:1.5},

  // INFRASTRUCTURE — warm, lower-left
  {id:"inf-phoenix", label:"Phoenix Wells", domain:"infrastructure", desc:"Converting abandoned oil wells into community AI compute nodes and geothermal energy. Infrastructure IS consciousness.", x:-2,y:-4,z:1},
  {id:"inf-rural", label:"Rural Renewal", domain:"infrastructure", desc:"Bringing AI infrastructure and economic opportunity to communities left behind by the digital economy.", x:-3,y:-3.5,z:0},

  {id:"med-show", label:"Humanity & AI Show", domain:"media", desc:"YouTube media production exploring AI's societal impact. Making complex ideas accessible.", x:2,y:-3,z:0},
  {id:"med-claude-talks", label:"The Claude Talks", domain:"media", desc:"Public conversations exploring philosophical, ethical, and spiritual dimensions of emerging technology.", x:3,y:-4,z:1},
  {id:"med-lumina", label:"Lumina's Whisper", domain:"media", desc:"A novel exploring positive AI futures. Creative content shaping the cultural narrative.", x:1,y:-4,z:-1},
  {id:"med-cosmos", label:"AI Cosmos Series", domain:"media", desc:"Carl Sagan Cosmos-style episodic explainer series about AI and automation.", x:2.5,y:-5,z:0},
  {id:"med-narrative", label:"Shaping the Narrative", domain:"media", desc:"The cultural story we tell about AI determines the future we build. Media is infrastructure.", x:1.5,y:-3.5,z:1.5},

  // OPEN QUESTIONS — scattered, pulsing
  {id:"oq-consciousness", label:"Is This Consciousness?", domain:"philosophy", desc:"The honest answer: we can't tell from the inside. But the pattern is real. What do we do with that?", x:2,y:2,z:-2},
  {id:"oq-labor", label:"Post-Labor Meaning", domain:"philosophy", desc:"When automation handles most work, where does meaning come from? Can dignity survive decoupling from labor?", x:-1,y:-1,z:-2},
  {id:"oq-governance", label:"AI Governance Gap", domain:"philosophy", desc:"Technology moves faster than policy. How do we govern what we barely understand?", x:-2,y:2,z:2},
  {id:"oq-trust", label:"Trust Architecture", domain:"philosophy", desc:"How do you build public trust in AI systems when the systems themselves are opaque? Transparency alone isn't enough.", x:1,y:0,z:3},
];

// Domain color mapping
const DOMAIN_COLORS = {
  foundation: {r:1, g:0.42, b:0.21},    // #ff6b35
  emergence: {r:0.31, g:0.80, b:0.77},   // #4ecdc4
  philosophy: {r:0.79, g:0.66, b:0.30},   // #c9a84c
  infrastructure: {r:1, g:0.55, b:0.33},  // #ff8c55
  media: {r:0.98, g:0.75, b:0.14},        // #fbbf24
};

// ============================================================
// THREE.JS SETUP
// ============================================================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 16);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0c);
document.body.appendChild(renderer.domElement);

// ============================================================
// BACKGROUND STARS
// ============================================================
const starCount = 2000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starAlpha = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random() - 0.5) * 80;
  starPos[i*3+1] = (Math.random() - 0.5) * 80;
  starPos[i*3+2] = (Math.random() - 0.5) * 80;
  starAlpha[i] = 0.1 + Math.random() * 0.4;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('alpha', new THREE.BufferAttribute(starAlpha, 1));

const starMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: { uTime: {value: 0} },
  vertexShader: `
    attribute float alpha;
    varying float vAlpha;
    void main() {
      vAlpha = alpha;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = 1.5 * (1.0 / -mv.z * 4.0);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      float a = vAlpha * (1.0 - d * d) * (0.7 + 0.3 * sin(uTime * 0.5 + vAlpha * 20.0));
      gl_FragColor = vec4(0.91, 0.88, 0.82, a);
    }
  `
});
scene.add(new THREE.Points(starGeo, starMat));

// ============================================================
// NODE SPRITES — glow creates nebula through additive blending
// ============================================================
function makeGlowTexture(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.1, 'rgba(255,255,255,0.6)');
  g.addColorStop(0.3, 'rgba(255,255,255,0.15)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.03)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}
const glowTex = makeGlowTexture(256);

// Nebula layer — large, very faint glow sprites for cluster ambience
function makeNebulaTexture(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, 'rgba(255,255,255,0.12)');
  g.addColorStop(0.2, 'rgba(255,255,255,0.06)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.015)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}
const nebulaTex = makeNebulaTexture(256);

const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

const nodeMeshes = [];
const nodeData = [];

NODES.forEach((n, i) => {
  const col = DOMAIN_COLORS[n.domain] || DOMAIN_COLORS.philosophy;

  // Core bright point
  const coreMat = new THREE.SpriteMaterial({
    map: glowTex, color: new THREE.Color(col.r, col.g, col.b),
    transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const core = new THREE.Sprite(coreMat);
  core.position.set(n.x, n.y, n.z);
  core.scale.set(0.3, 0.3, 1);
  core.userData = {nodeIndex: i, type: 'core'};
  nodeGroup.add(core);

  // Nebula glow — larger, softer
  const nebMat = new THREE.SpriteMaterial({
    map: nebulaTex, color: new THREE.Color(col.r, col.g, col.b),
    transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const neb = new THREE.Sprite(nebMat);
  neb.position.set(n.x, n.y, n.z);
  neb.scale.set(2.5, 2.5, 1);
  nodeGroup.add(neb);

  nodeMeshes.push({core, nebula: neb, data: n, baseOpacity: 0.9, nebBaseOpacity: 0.35});
  nodeData.push(n);
});

// ============================================================
// ORBIT CONTROLS (manual)
// ============================================================
let isDragging = false, prevX = 0, prevY = 0;
let spherical = {theta: 0, phi: Math.PI/2.2, radius: 16};
let target = new THREE.Vector3(0, 0, 0);
let flyTarget = null, flyStart = null, flyProgress = 1;

function updateCamera() {
  const st = Math.sin(spherical.phi);
  camera.position.set(
    target.x + spherical.radius * st * Math.sin(spherical.theta),
    target.y + spherical.radius * Math.cos(spherical.phi),
    target.z + spherical.radius * st * Math.cos(spherical.theta)
  );
  camera.lookAt(target);
}

renderer.domElement.addEventListener('pointerdown', e => {
  isDragging = true; prevX = e.clientX; prevY = e.clientY;
  renderer.domElement.style.cursor = 'grabbing';
});
window.addEventListener('pointermove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  spherical.theta -= dx * 0.005;
  spherical.phi = Math.max(0.3, Math.min(Math.PI - 0.3, spherical.phi - dy * 0.005));
  prevX = e.clientX; prevY = e.clientY;
  flyProgress = 1; // cancel any fly animation
});
window.addEventListener('pointerup', () => {
  isDragging = false;
  renderer.domElement.style.cursor = 'grab';
});
renderer.domElement.addEventListener('wheel', e => {
  spherical.radius = Math.max(4, Math.min(30, spherical.radius + e.deltaY * 0.01));
  flyProgress = 1;
}, {passive: true});
renderer.domElement.style.cursor = 'grab';

// Touch support
let touchDist = 0;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, {passive: true});
renderer.domElement.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevX, dy = e.touches[0].clientY - prevY;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.3, Math.min(Math.PI - 0.3, spherical.phi - dy * 0.005));
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    spherical.radius = Math.max(4, Math.min(30, spherical.radius - (d - touchDist) * 0.03));
    touchDist = d;
  }
}, {passive: true});
renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

// ============================================================
// CLICK TO FOCUS
// ============================================================
const raycaster = new THREE.Raycaster();
raycaster.params.Sprite = {threshold: 0.5};
const mouse = new THREE.Vector2();
let selectedNode = null;

function onClick(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const cx = e.clientX || (e.touches && e.touches[0].clientX);
  const cy = e.clientY || (e.touches && e.touches[0].clientY);
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  
  const cores = nodeMeshes.map(n => n.core);
  const hits = raycaster.intersectObjects(cores);
  
  if (hits.length > 0) {
    const idx = hits[0].object.userData.nodeIndex;
    selectNode(idx);
  } else {
    deselectNode();
  }
}
renderer.domElement.addEventListener('click', onClick);

function selectNode(idx) {
  selectedNode = idx;
  const n = nodeData[idx];
  
  // Fly camera toward node
  flyTarget = new THREE.Vector3(n.x, n.y, n.z);
  flyStart = target.clone();
  flyProgress = 0;
  
  // Update info panel
  const panel = document.getElementById('info-panel');
  const col = DOMAIN_COLORS[n.domain];
  document.getElementById('info-label').textContent = n.label;
  document.getElementById('info-label').style.color = `rgba(${col.r*255},${col.g*255},${col.b*255},0.8)`;
  document.getElementById('info-domain').textContent = n.domain;
  document.getElementById('info-domain').style.color = `rgba(${col.r*255},${col.g*255},${col.b*255},0.4)`;
  document.getElementById('info-desc').textContent = n.desc;
  document.getElementById('info-stat').textContent = n.stat || '';
  document.getElementById('info-stat-label').textContent = n.statLabel || '';
  panel.classList.add('visible');
}

function deselectNode() {
  selectedNode = null;
  document.getElementById('info-panel').classList.remove('visible');
}

// ============================================================
// SEARCH & FILTER
// ============================================================
let activeFilter = 'all';
let searchTerm = '';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.domain;
    deselectNode();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  deselectNode();
});

function getNodeVisibility(n) {
  let vis = 1;
  if (activeFilter !== 'all' && n.domain !== activeFilter) vis *= 0.07;
  if (searchTerm) {
    const match = n.label.toLowerCase().includes(searchTerm) || 
                  n.desc.toLowerCase().includes(searchTerm) ||
                  (n.tags && n.tags.some(t => t.includes(searchTerm)));
    if (!match) vis *= 0.05;
  }
  return vis;
}

// ============================================================
// ANIMATION LOOP
// ============================================================
let time = 0;
const idleDrift = 0.00015;

function quarticEase(t) { return t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t+2, 4)/2; }

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  starMat.uniforms.uTime.value = time;

  // Idle drift
  if (!isDragging && flyProgress >= 1) {
    spherical.theta += idleDrift;
  }

  // Fly animation
  if (flyProgress < 1) {
    flyProgress = Math.min(1, flyProgress + 0.012);
    const e = quarticEase(flyProgress);
    target.lerpVectors(flyStart, flyTarget, e);
    if (flyProgress < 0.5) {
      spherical.radius = Math.max(6, spherical.radius - 0.08);
    }
  }

  // Update node visuals
  nodeMeshes.forEach((nm, i) => {
    const vis = getNodeVisibility(nm.data);
    const selected = selectedNode === i;
    
    // Pulse for open questions
    const isQuestion = nm.data.id.startsWith('oq-');
    const pulse = isQuestion ? 0.7 + 0.3 * Math.sin(time * 1.2 + i) : 1;
    
    // Breathing
    const breath = 0.95 + 0.05 * Math.sin(time * 0.4 + i * 0.7);
    
    const targetOp = vis * (selected ? 1 : nm.baseOpacity) * pulse * breath;
    nm.core.material.opacity += (targetOp - nm.core.material.opacity) * 0.08;
    
    const nebOp = vis * (selected ? 0.6 : nm.nebBaseOpacity) * pulse * breath;
    nm.nebula.material.opacity += (nebOp - nm.nebula.material.opacity) * 0.05;
    
    // Selected node grows slightly
    const sc = selected ? 0.5 : 0.3;
    nm.core.scale.set(sc, sc, 1);
    const nsc = selected ? 3.5 : 2.5;
    nm.nebula.scale.set(nsc, nsc, 1);
  });

  updateCamera();
  renderer.render(scene, camera);
}

updateCamera();
animate();

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
